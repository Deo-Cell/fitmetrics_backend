services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fitmetrics
      POSTGRES_PASSWORD: fitmetrics
      POSTGRES_DB: fitmetrics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitmetrics"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://fitmetrics:fitmetrics@db:5432/fitmetrics
      JWT_SECRET: dev-secret-change-in-prod
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
